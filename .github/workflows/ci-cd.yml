name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '24'
  FRONTEND_DIR: 'Frontends/ReactTS'
  BACKEND_DIR: 'Backends/WebApi'

jobs:
  backend-build-and-test:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ${{ env.BACKEND_DIR }}

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: ${{ env.BACKEND_DIR }}

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal
        working-directory: ${{ env.BACKEND_DIR }}

  frontend-build-and-lint:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ env.FRONTEND_DIR }}

      - name: Lint
        run: pnpm lint || true
        working-directory: ${{ env.FRONTEND_DIR }}

      - name: Build
        run: pnpm build
        working-directory: ${{ env.FRONTEND_DIR }}

  deploy:
    name: Deploy to OCI
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend-build-and-test, frontend-build-and-lint]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Backend to OCI
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd /opt/horuseye
            git pull
            docker compose build --no-cache api
            docker compose up -d api

      - name: Verify Backend Health
        run: |
          sleep 10
          curl -sf https://horuseye-api.mauricioadachi.dev/health || echo "Health check pending..."
# Test CI/CD
