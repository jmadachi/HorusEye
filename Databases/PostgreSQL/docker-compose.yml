services:
  postgres:
    image: postgres:18-alpine
    container_name: horus-eyes-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-horuseyedb}
      POSTGRES_USER: ${POSTGRES_USER:-horuseyeuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-H0rv$$Ey3}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      PGDATA: /var/lib/postgresql/data
    volumes:
      - ./data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - horuseye-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-horuseyeuser} -d ${POSTGRES_DB:-horuseyedb}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  horuseye-network:
    driver: bridge
