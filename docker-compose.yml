# ============================================
# docker-compose.yml - HorusEye Backend Stack
# Frontend se despliega en Vercel
# ============================================
# Uso: docker compose up -d
# Requiere: .env con conexiones

services:
  postgres:
    image: postgres:18-alpine
    container_name: horuseye-db
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${DB_USER:-horuseyeuser}
      POSTGRES_PASSWORD: H0rvEy3
      POSTGRES_DB: ${DB_NAME:-horuseyedb}
      PGDATA: /var/lib/postgresql
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: horuseye-api
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: Host=horuseye-db;Port=5432;Database=horuseyedb;Username=horuseyeuser;Password=H0rvEy3
      Jwt__Key: ${JWT_KEY:-HorusEyeSuperSecretKey2026!@#$%^&*()VeryLongSecure}
      Jwt__Issuer: HorusEyeAPI
      Jwt__Audience: HorusEyeFrontend
      CORS__AllowedOrigin: https://horuseye.vercel.app
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      postgres:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: horuseye-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

volumes:
  pgdata:
